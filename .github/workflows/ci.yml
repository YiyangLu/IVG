name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Setup Node.js for frontend build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deepdata/web/frontend/package-lock.json

      # Build frontend
      - name: Install frontend dependencies
        working-directory: deepdata/web/frontend
        run: npm ci

      - name: Build frontend
        working-directory: deepdata/web/frontend
        run: npm run build

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install and test
      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/mle/
        continue-on-error: true  # Don't fail on test errors for now

      # Verify package builds correctly
      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check package contents
        run: |
          pip install dist/*.whl
          python -c "import deepdata; print(f'Version: {deepdata.__version__}')"
          python -c "from deepdata.cli import main; print('CLI import OK')"
